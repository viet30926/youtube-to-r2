name: ⚡ Enterprise YouTube to R2 Downloader

on:
  repository_dispatch:
    types: [start-download]
  workflow_dispatch:
    inputs:
      youtube_url:
        description: '🔗 Đường dẫn (URL) video YouTube'
        required: true
        type: string
      custom_filename:
        description: '📝 Tên file (Để trống nếu dùng tên gốc. Không cần ghi đuôi)'
        required: false
        type: string
      audio_format:
        description: '🎵 Định dạng âm thanh'
        required: true
        default: 'mp3'
        type: choice
        options:
          - mp3
          - m4a
          - wav

jobs:
  download-and-upload:
    name: 🚀 Fetch & Upload
    runs-on: ubuntu-latest

    steps:
      - name: 🧹 Chuẩn bị không gian làm việc
        run: mkdir -p ./downloaded_audio

      - name: 🍪 Giải mã YouTube Cookies từ Base64
        env:
          COOKIE_BASE64: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$COOKIE_BASE64" ]; then
            echo "$COOKIE_BASE64" | base64 -d > ./downloaded_audio/cookies.txt
            echo "✅ Đã nạp Cookie thành công."
          else
            echo "⚠️ Cảnh báo: Chưa cấu hình Secret YOUTUBE_COOKIES."
          fi

      - name: ⚙️ Cài đặt Python, FFmpeg, Node.js & yt-dlp [default] (Fix N-Challenge)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg nodejs python3-pip
          pip install --upgrade pip
          pip install --upgrade "yt-dlp[default]"

      - name: ⬇️ Tải Audio & Chuẩn hoá Metadata
        id: download
        env:
          YOUTUBE_URL: ${{ github.event.client_payload.youtube_url || inputs.youtube_url }}
          CUSTOM_FILENAME: ${{ github.event.client_payload.custom_filename || inputs.custom_filename }}
          AUDIO_FORMAT: ${{ github.event.client_payload.audio_format || inputs.audio_format || 'mp3' }}
        run: |
          if [ -z "$YOUTUBE_URL" ]; then
            echo "❌ Lỗi: Không tìm thấy đường dẫn YouTube!"
            exit 1
          fi

          cd downloaded_audio
          
          COOKIE_ARG=""
          if [ -f "cookies.txt" ]; then
            COOKIE_ARG="--cookies cookies.txt"
          fi

          if [ -n "$CUSTOM_FILENAME" ]; then
            SAFE_NAME=$(echo "$CUSTOM_FILENAME" | sed -e 's/[^a-zA-Z0-9_.-]/_/g')
            OUTPUT_TEMPLATE="${SAFE_NAME}.%(ext)s"
          else
            OUTPUT_TEMPLATE="%(title)s_[%(id)s].%(ext)s"
          fi

          # Thêm --remote-components ejs:github để yt-dlp tự động giải mã thuật toán mới của YouTube
          yt-dlp $COOKIE_ARG \
            --remote-components ejs:github \
            -x \
            --audio-format "$AUDIO_FORMAT" \
            --audio-quality 0 \
            --restrict-filenames \
            --no-playlist \
            --force-ipv4 \
            --no-add-metadata \
            --no-embed-thumbnail \
            --postprocessor-args "ExtractAudio:-map_metadata -1" \
            -o "$OUTPUT_TEMPLATE" \
            "$YOUTUBE_URL"
          
          FILE_NAME=$(ls -1 | grep -v "cookies.txt" | head -n 1)
          if [ -z "$FILE_NAME" ]; then
            echo "❌ Lỗi: Không tìm thấy file âm thanh sau khi tải!"
            exit 1
          fi
          
          if [ "$AUDIO_FORMAT" = "mp3" ]; then
            MIME_TYPE="audio/mpeg"
          elif [ "$AUDIO_FORMAT" = "m4a" ]; then
            MIME_TYPE="audio/mp4"
          elif [ "$AUDIO_FORMAT" = "wav" ]; then
            MIME_TYPE="audio/wav"
          else
            MIME_TYPE="application/octet-stream"
          fi
          
          echo "filename=$FILE_NAME" >> $GITHUB_OUTPUT
          echo "mimetype=$MIME_TYPE" >> $GITHUB_OUTPUT

      - name: ☁️ Upload lên Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp ./downloaded_audio/${{ steps.download.outputs.filename }} s3://${{ secrets.R2_BUCKET_NAME }}/ \
            --endpoint-url ${{ secrets.R2_ENDPOINT_URL }} \
            --content-type "${{ steps.download.outputs.mimetype }}" \
            --metadata-directive REPLACE

      - name: 🎉 Báo cáo kết quả & Khởi tạo Link
        env:
          PUBLIC_DOMAIN: ${{ secrets.R2_PUBLIC_DOMAIN }}
          FILE_NAME: ${{ steps.download.outputs.filename }}
          TARGET_URL: ${{ github.event.client_payload.youtube_url || inputs.youtube_url }}
        run: |
          echo "### ✅ Tiến trình hoàn tất thành công!" >> $GITHUB_STEP_SUMMARY
          echo "- **Video gốc:** $TARGET_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Tên file:** \`$FILE_NAME\`" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "$PUBLIC_DOMAIN" ]; then
            CLEAN_DOMAIN=$(echo "$PUBLIC_DOMAIN" | sed 's/\/$//')
            ENCODED_FILE=$(jq -nr --arg v "$FILE_NAME" '$v|@uri')
            PUBLIC_URL="$CLEAN_DOMAIN/$ENCODED_FILE"
            
            echo "- **Link Stream trực tiếp:** [▶️ Bấm để Nghe / Tải]($PUBLIC_URL)" >> $GITHUB_STEP_SUMMARY
            echo "- **URL Raw:** \`$PUBLIC_URL\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Link trực tiếp:** ⚠️ Bạn chưa cấu hình biến \`R2_PUBLIC_DOMAIN\` trong Secrets." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "- **Trạng thái:** Dữ liệu thừa đã được dọn sạch 🧹" >> $GITHUB_STEP_SUMMARY
