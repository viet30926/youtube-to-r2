<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ YouTube to R2 Cloud Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darker: '#09090b', card: '#121216', border: '#27272a' } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-darker text-zinc-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col space-y-2 pointer-events-none"></div>

    <main class="w-full max-w-md">
        <div class="flex items-center space-x-3 mb-6 px-1">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 100-6 3 3 0 000 6z"/></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-white">R2 Media Studio</h1>
                <p class="text-xs text-zinc-400">Hệ thống phân phối đa thiết bị</p>
            </div>
        </div>

        <div class="bg-[#121216] border border-[#27272a] rounded-2xl p-6 shadow-2xl">
            <form id="download-form" onsubmit="event.preventDefault(); triggerDownload();" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">🔗 Đường dẫn YouTube</label>
                    <input type="url" id="yt-url" required placeholder="https://www.youtube.com/watch?v=..." class="w-full bg-darker text-sm text-white px-3.5 py-3 rounded-xl border border-zinc-700 focus:border-indigo-500 focus:outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">📝 Đổi tên file tùy chỉnh <span class="text-zinc-600">(Không bắt buộc)</span></label>
                    <input type="text" id="custom-name" placeholder="VD: podcast_tap_1" class="w-full bg-darker text-sm text-white px-3.5 py-3 rounded-xl border border-zinc-700 focus:border-indigo-500 focus:outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">🎵 Định dạng âm thanh</label>
                    <select id="audio-format" class="w-full bg-darker text-sm text-white px-3.5 py-3 rounded-xl border border-zinc-700 focus:border-indigo-500 focus:outline-none transition">
                        <option value="mp3">MP3 (Phổ biến)</option>
                        <option value="m4a">M4A (Chất lượng cao)</option>
                        <option value="wav">WAV (Không nén)</option>
                    </select>
                </div>

                <button type="submit" id="submit-btn" class="w-full mt-2 py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/30 transition flex items-center justify-center space-x-2">
                    <svg id="btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    <span id="btn-text">Tải lên R2 Ngay</span>
                </button>
            </form>
        </div>
    </main>

    <script>
        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            const bgClass = type === "success" ? "bg-emerald-500/10 border-emerald-500/20 text-emerald-400" : "bg-rose-500/10 border-rose-500/20 text-rose-400";
            toast.className = `pointer-events-auto px-4 py-3 rounded-xl border backdrop-blur-md shadow-lg text-xs font-semibold flex items-center space-x-2 transition-all duration-300 opacity-0 translate-y-2 ${bgClass}`;
            toast.innerHTML = `<span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove("opacity-0", "translate-y-2"); }, 10);
            setTimeout(() => { toast.classList.add("opacity-0", "translate-y-2"); setTimeout(() => toast.remove(), 300); }, 4000);
        }

        async function triggerDownload() {
            const urlInput = document.getElementById("yt-url");
            const nameInput = document.getElementById("custom-name");
            const formatSelect = document.getElementById("audio-format");

            const url = urlInput.value.trim();
            const filename = nameInput.value.trim();
            const format = formatSelect.value;

            const btn = document.getElementById("submit-btn");
            const btnText = document.getElementById("btn-text");
            const btnIcon = document.getElementById("btn-icon");

            // Khóa nút, chuyển sang trạng thái chờ xử lý (Ngăn chặn click đúp)
            btn.disabled = true;
            btn.classList.add("opacity-70", "cursor-not-allowed");
            btnIcon.outerHTML = `<svg id="btn-icon" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            btnText.innerText = "Đang truyền lệnh...";

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        youtube_url: url,
                        custom_filename: filename,
                        audio_format: format
                    })
                });

                // Xử lý an toàn khi server trả về dữ liệu không phải JSON (tránh crash ứng dụng)
                const contentType = response.headers.get("content-type");
                let data;
                if (contentType && contentType.includes("application/json")) {
                    data = await response.json();
                } else {
                    throw new Error(`Lỗi phản hồi máy chủ (Mã trạng thái: ${response.status})`);
                }

                if (!response.ok) {
                    throw new Error(data.error || "Không thể xử lý yêu cầu");
                }

                showToast("Đã kích hoạt thành công! Hệ thống đang tải ngầm.", "success");
                document.getElementById("download-form").reset();

            } catch (error) {
                showToast(`Thất bại: ${error.message}`, "error");
            } finally {
                // Phục hồi trạng thái nút bấm
                btn.disabled = false;
                btn.classList.remove("opacity-70", "cursor-not-allowed");
                const currentIcon = document.getElementById("submit-btn").querySelector("svg");
                if (currentIcon) {
                    currentIcon.outerHTML = `<svg id="btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>`;
                }
                btnText.innerText = "Tải lên R2 Ngay";
            }
        }
    </script>
</body>
</html>
