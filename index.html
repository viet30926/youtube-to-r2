<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ YouTube to R2 Cloud Studio</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darker: '#09090b',
                        card: '#121216',
                        border: '#27272a'
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        /* Custom scrollbar & glassmorphism */
        .glass { background: rgba(18, 18, 22, 0.75); backdrop-filter: blur(12px); }
        @keyframes pulse-subtle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .animate-pulse-subtle { animation: pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-darker text-zinc-100 min-h-screen flex flex-col items-center justify-between p-4 sm:p-6 selection:bg-indigo-500 selection:text-white">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col space-y-2 pointer-events-none"></div>

    <!-- Main Container -->
    <main class="w-full max-w-lg my-auto">
        
        <!-- Header -->
        <div class="flex items-center justify-between mb-8 px-1">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 100-6 3 3 0 000 6z"/></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white">R2 Media Studio</h1>
                    <p class="text-xs text-zinc-400">Hệ thống điều phối ngầm GitHub Actions</p>
                </div>
            </div>
            <button onclick="toggleConfig()" class="p-2 rounded-xl bg-card border border-border text-zinc-400 hover:text-white hover:border-zinc-700 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            </button>
        </div>

        <!-- Card Container -->
        <div class="glass border border-border rounded-2xl p-6 shadow-2xl relative overflow-hidden">
            
            <!-- Config Panel (Collapsible) -->
            <div id="config-section" class="mb-6 p-4 bg-zinc-900/90 rounded-xl border border-zinc-800 hidden transition-all duration-300">
                <div class="flex justify-between items-center mb-3">
                    <h2 class="text-xs font-semibold text-zinc-300 uppercase tracking-wider">Cấu hình kết nối API</h2>
                    <span class="text-[10px] text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded-full border border-indigo-500/20">Bảo mật nội bộ</span>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-[11px] font-medium text-zinc-400 mb-1">GitHub Username</label>
                        <input type="text" id="gh-username" placeholder="VD: octocat" class="w-full bg-darker text-sm text-white px-3 py-2 rounded-lg border border-border focus:border-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-zinc-400 mb-1">Repository Name</label>
                        <input type="text" id="gh-repo" value="youtube-to-r2" placeholder="youtube-to-r2" class="w-full bg-darker text-sm text-white px-3 py-2 rounded-lg border border-border focus:border-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-[11px] font-medium text-zinc-400 mb-1">Personal Access Token (PAT)</label>
                        <input type="password" id="gh-token" placeholder="github_pat_..." class="w-full bg-darker text-sm text-white px-3 py-2 rounded-lg border border-border focus:border-indigo-500 focus:outline-none transition">
                    </div>
                    <button onclick="saveConfig()" class="w-full py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold rounded-lg shadow-lg shadow-indigo-600/25 transition">Lưu cấu hình</button>
                </div>
            </div>

            <!-- Download Form -->
            <form id="download-form" onsubmit="event.preventDefault(); triggerDownload();" class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">🔗 Đường dẫn YouTube</label>
                    <div class="relative">
                        <input type="url" id="yt-url" required placeholder="https://www.youtube.com/watch?v=..." class="w-full bg-darker text-sm text-white px-3.5 py-3 rounded-xl border border-border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">📝 Đổi tên file tùy chỉnh <span class="text-zinc-600">(Không bắt buộc)</span></label>
                    <input type="text" id="custom-name" placeholder="VD: tap_pod cast_hay_nhat" class="w-full bg-darker text-sm text-white px-3.5 py-3 rounded-xl border border-border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-1.5">🎵 Định dạng âm thanh</label>
                    <select id="audio-format" class="w-full bg-darker text-sm text-white px-3.5 py-3 rounded-xl border border-border focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                        <option value="mp3">MP3 (Phổ biến nhất)</option>
                        <option value="m4a">M4A (Chất lượng cao)</option>
                        <option value="wav">WAV (Không nén)</option>
                    </select>
                </div>

                <button type="submit" id="submit-btn" class="w-full mt-2 py-3 px-4 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/30 transform transition active:scale-[0.98] flex items-center justify-center space-x-2">
                    <svg id="btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                    <span id="btn-text">Kích hoạt tải lên R2</span>
                </button>
            </form>

        </div>
    </main>

    <!-- Footer -->
    <footer class="text-xs text-zinc-500 mt-6 text-center">
        Powered by GitHub Actions & Cloudflare R2 • Secure Client-Side Engine
    </footer>

    <!-- Script Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if(localStorage.getItem("gh_username")) document.getElementById("gh-username").value = localStorage.getItem("gh_username");
            if(localStorage.getItem("gh_repo")) document.getElementById("gh-repo").value = localStorage.getItem("gh_repo");
            if(localStorage.getItem("gh_token")) document.getElementById("gh-token").value = localStorage.getItem("gh_token");
        });

        function toggleConfig() {
            const section = document.getElementById("config-section");
            section.classList.toggle("hidden");
        }

        function saveConfig() {
            const user = document.getElementById("gh-username").value.trim();
            const repo = document.getElementById("gh-repo").value.trim();
            const token = document.getElementById("gh-token").value.trim();
            
            if(!user || !token) {
                showToast("Vui lòng điền đầy đủ Username và Token!", "error");
                return;
            }

            localStorage.setItem("gh_username", user);
            localStorage.setItem("gh_repo", repo || "youtube-to-r2");
            localStorage.setItem("gh_token", token);
            toggleConfig();
            showToast("Đã lưu cấu hình kết nối an toàn!", "success");
        }

        function showToast(message, type = "success") {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            
            const bgClass = type === "success" ? "bg-emerald-500/10 border-emerald-500/20 text-emerald-400" : "bg-rose-500/10 border-rose-500/20 text-rose-400";
            
            toast.className = `pointer-events-auto px-4 py-3 rounded-xl border backdrop-blur-md shadow-lg text-xs font-semibold flex items-center space-x-2 transition-all duration-300 opacity-0 translate-y-2 ${bgClass}`;
            toast.innerHTML = `<span>${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove("opacity-0", "translate-y-2"); }, 10);
            
            setTimeout(() => {
                toast.classList.add("opacity-0", "translate-y-2");
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        async function triggerDownload() {
            const username = localStorage.getItem("gh_username");
            const repo = localStorage.getItem("gh_repo") || "youtube-to-r2";
            const token = localStorage.getItem("gh_token");
            
            const url = document.getElementById("yt-url").value.trim();
            const filename = document.getElementById("custom-name").value.trim();
            const format = document.getElementById("audio-format").value;

            if (!username || !token) {
                showToast("Bạn chưa cấu hình API. Hãy bấm icon bánh răng ở góc trên!", "error");
                toggleConfig();
                return;
            }

            const btn = document.getElementById("submit-btn");
            const btnText = document.getElementById("btn-text");
            const btnIcon = document.getElementById("btn-icon");

            btn.disabled = true;
            btn.classList.add("opacity-70", "cursor-not-allowed");
            btnIcon.outerHTML = `<svg class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
            btnText.innerText = "Đang truyền lệnh đến GitHub...";

            try {
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/actions/workflows/download.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            youtube_url: url,
                            custom_filename: filename,
                            audio_format: format
                        }
                    })
                });

                if (response.ok) {
                    showToast("Đã kích hoạt kịch bản ngầm! Tiến trình đang chạy...", "success");
                    document.getElementById("download-form").reset();
                } else {
                    const errData = await response.json();
                    throw new Error(errData.message || "Lỗi không xác định từ GitHub API");
                }
            } catch (error) {
                showToast(`Thất bại: ${error.message}`, "error");
            } finally {
                btn.disabled = false;
                btn.classList.remove("opacity-70", "cursor-not-allowed");
                const currentIcon = document.getElementById("submit-btn").querySelector("svg");
                if (currentIcon) currentIcon.outerHTML = `<svg id="btn-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>`;
                btnText.innerText = "Kích hoạt tải lên R2";
            }
        }
    </script>
</body>
</html>
